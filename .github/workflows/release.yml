name: Release
on:
  push:
    tags:
      - 'v*'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  RUST_VERSION: "1.94.0"

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: hasp-linux-amd64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: hasp-linux-arm64

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: |
          rustup toolchain install ${{ env.RUST_VERSION }} --profile minimal
          rustup default ${{ env.RUST_VERSION }}
          rustup target add ${{ matrix.target }}

      - name: Install musl tools (Linux only)
        if: contains(matrix.target, 'linux')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross-compilation linker (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CC_aarch64_unknown_linux_musl=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build release binary
        env:
          GITHUB_REPO: electricapp/hasp
          SOURCE_DATE_EPOCH: "0"
          RUSTFLAGS: "--remap-path-prefix=${{ github.workspace }}=."
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/hasp ${{ matrix.artifact }}

      - name: Generate SHA256
        run: shasum -a 256 ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      - name: Install cargo-sbom
        run: cargo install cargo-sbom --locked

      - name: Generate SPDX SBOM
        run: cargo sbom --output-format spdx_json_2_3 > ${{ matrix.artifact }}.spdx.json

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256
            ${{ matrix.artifact }}.spdx.json

  # ─── Sigstore signing (SLSA provenance without managing GPG keys) ───────────
  sign:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          merge-multiple: true

      - name: Install cosign
        run: |
          COSIGN_VERSION="v2.4.3"
          COSIGN_SHA256="caaad125acef1cb81d58dcdc454a1e429d09a750d1e9e2b3ed1aed8964454708"
          curl -sL "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64" -o cosign
          echo "${COSIGN_SHA256}  cosign" | sha256sum --check --strict
          chmod +x cosign

      - name: Sign all binaries with Sigstore (keyless OIDC)
        run: |
          for bin in hasp-*; do
            [[ "$bin" == *.sha256 ]]    && continue
            [[ "$bin" == *.sig ]]       && continue
            [[ "$bin" == *.spdx.json ]] && continue
            ./cosign sign-blob --yes --output-signature "${bin}.sig" --output-certificate "${bin}.pem" "${bin}"
          done

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: signatures
          path: |
            *.sig
            *.pem

  # ─── SLSA build provenance attestation ──────────────────────────────────────
  attest:
    needs: build
    strategy:
      matrix:
        include:
          - artifact: hasp-linux-amd64
          - artifact: hasp-linux-arm64
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: ${{ matrix.artifact }}

      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: ${{ matrix.artifact }}

  # ─── GitHub Release ─────────────────────────────────────────────────────────
  release:
    needs: [build, sign, attest]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "hasp ${{ github.ref_name }}" \
            --generate-notes \
            hasp-* *.sha256 *.sig *.pem *.spdx.json
